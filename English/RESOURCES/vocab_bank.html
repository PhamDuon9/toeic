.subtitle{color:#64748b;font-size:.88rem;margin-bottom:24px}

/* Controls */
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;align-items:center}
.search-box{flex:1;min-width:200px;padding:10px 16px;background:#111827;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.92rem;outline:none}

.filter-btn.active{border-color:#38bdf8;background:#0c4a6e;color:#38bdf8}
.stats-bar{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{background:#111827;border:1px solid #334155;border-radius:8px;padding:8px 16px;font-size:.82rem;color:#94a3b8}
.stat-chip span{color:#38bdf8;font-weight:700}

/* Table */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #1e293b}
table{width:100%;border-collapse:collapse;min-width:600px}
thead{background:#111827}
th{padding:11px 16px;text-align:left;font-size:.78rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1e293b;white-space:nowrap}
td{padding:10px 16px;border-bottom:1px solid #0f172a;font-size:.9rem;vertical-align:top}
tr:hover td{background:#111827}
tr.mastered td{opacity:.5}
.word-en{font-weight:700;color:#e2e8f0}
.word-pos{display:inline-block;font-size:.7rem;padding:1px 7px;border-radius:99px;font-weight:600;margin-left:6px;vertical-align:middle}
.pos-n{background:#0c4a6e;color:#38bdf8}
.pos-v{background:#3b1d00;color:#f59e0b}
.pos-adj{background:#2d1657;color:#a78bfa}
.pos-adv{background:#052e16;color:#86efac}
.pos-ph{background:#1a1a2e;color:#94a3b8}
.word-vi{color:#94a3b8}
.word-ex{color:#475569;font-size:.82rem;font-style:italic;margin-top:3px}
.cat-badge{font-size:.72rem;padding:2px 8px;border-radius:99px;background:#1e293b;color:#64748b;white-space:nowrap}

/* Status button */
.status-btn{padding:4px 10px;border-radius:6px;border:1px solid #334155;background:transparent;font-size:.75rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.status-btn.new{color:#64748b;border-color:#334155}
.status-btn.learning{color:#f59e0b;border-color:#f59e0b;background:#3b1d00}
.status-btn.mastered{color:#22c55e;border-color:#22c55e;background:#052e16}

.no-results{text-align:center;padding:40px;color:#334155;font-size:.95rem}

/* Nav back */
.nav-back{display:inline-flex;align-items:center;gap:6px;color:#64748b;font-size:.85rem;margin-bottom:20px;cursor:pointer;text-decoration:none}
.nav-back:hover{color:#38bdf8}
</style>
</head>

// Status stored in localStorage
const STATUS_KEY = 'toeic_vocab_status';
let statusMap = JSON.parse(localStorage.getItem(STATUS_KEY) || '{}');

let currentFilter = 'all';

function saveStatus() {
  localStorage.setItem(STATUS_KEY, JSON.stringify(statusMap));
  updateStats();
}

function cycleStatus(word) {
  const cur = statusMap[word] || 'new';
  statusMap[word] = cur === 'new' ? 'learning' : cur === 'learning' ? 'mastered' : 'new';
  saveStatus();
  renderTable();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const tbody = document.getElementById('vocab-table');
  const noRes = document.getElementById('no-results');

  let filtered = vocab.filter(v => {
    const matchSearch = !search || v.en.toLowerCase().includes(search) || v.vi.toLowerCase().includes(search) || v.ex.toLowerCase().includes(search);
    const st = statusMap[v.en] || 'new';
    const matchFilter = currentFilter === 'all' || currentFilter === v.cat ||
      currentFilter === 'learning' && st === 'learning' ||
      currentFilter === 'mastered' && st === 'mastered';
    return matchSearch && matchFilter;
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  const posClass = {n:'pos-n',v:'pos-v',adj:'pos-adj',adv:'pos-adv',phrase:'pos-ph'};
  const posLabel = {n:'noun',v:'verb',adj:'adj',adv:'adv',phrase:'phrase'};
  const catColors = {Finance:'#0c4a6e',Office:'#1e1040',HR:'#052e16',Logistics:'#3b1d00','Customer Service':'#1a0a2e',Technology:'#0a2e1a',Marketing:'#2e1a0a',Legal:'#1a2e0a'};

  tbody.innerHTML = filtered.map(v => {
    const st = statusMap[v.en] || 'new';
    const statusLabel = st === 'mastered' ? '✅ Mastered' : st === 'learning' ? '🟡 Learning' : '🔵 New';
    return `<tr class="${st === 'mastered' ? 'mastered' : ''}">
      <td><span class="word-en">${v.en}</span><span class="word-pos ${posClass[v.pos] || 'pos-ph'}">${posLabel[v.pos]||v.pos}</span></td>
      <td class="word-vi">${v.vi}<div class="word-ex">${v.ex}</div></td>
      <td><span class="cat-badge" style="background:${catColors[v.cat]||'#1e293b'};color:#94a3b8">${v.cat}</span></td>
      <td><button class="status-btn ${st}" onclick="cycleStatus('${v.en}')">${statusLabel}</button></td>
    </tr>`;
  }).join('');
}

function updateStats() {
  const total = vocab.length;
  let learning = 0, mastered = 0;
  vocab.forEach(v => {
    const s = statusMap[v.en] || 'new';
    if (s === 'learning') learning++;
    else if (s === 'mastered') mastered++;
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-new').textContent = total - learning - mastered;
  document.getElementById('stat-learning').textContent = learning;
  document.getElementById('stat-mastered').textContent = mastered;
}

renderTable();
updateStats();
</script>
</body>
</html>
